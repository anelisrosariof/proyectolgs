services:
  postgres:
    image: postgres:17
    container_name: luxury-grand-stage-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luxury_grand_stage
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
